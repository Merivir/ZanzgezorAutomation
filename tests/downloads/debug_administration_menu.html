  background-color: white;
  width: 30px;
  height: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 15px;
  box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
}
.dragDropToggleWrap i {
  color: #263D88;
  font-size: 16px;
  width: 18px;
  height: 16px;
}

.rightCollapsedButton {
  left: -15px;
}

.leftCollapsedButton {
  right: -15px;
}

.rightDragCall .p-dialog {
  position: absolute !important;
}

.dropCallZone {
  position: absolute;
  width: 100%;
  height: 90px;
  z-index: 100;
  bottom: 0;
  opacity: 0.6;
  left: 0;
  background: linear-gradient(180deg, rgb(255, 255, 255) 9%, rgb(216, 250, 251));
}

.dropCallZoneFirst {
  position: absolute;
  width: 100%;
  top: 50px;
  left: 0;
  height: 50px;
  z-index: 100;
  opacity: 0.6;
  background: linear-gradient(0deg, rgb(255, 255, 255) 9%, rgb(216, 250, 251));
}

.static-drag-container {
  border-left: 1px solid #DEDFE2;
  border-right: 1px solid #DEDFE2;
  height: calc(100vh - 70px);
  border-radius: 5px;
  top: -2px;
  background: #FAFBFC;
  padding: 0.25rem 1rem 0 1rem;
}

.rectangle {
  cursor: pointer;
  position: absolute;
  top: 0px;
  right: 0;
  width: 200px;
}

.rectangle::before,
.rectangle::after {
  border-top-right-radius: 8px;
  content: "";
  position: absolute;
  top: 0;
  width: 30px;
  height: 30px;
}

.rectangle::after {
  right: 0;
  background: linear-gradient(to top right, transparent 50%, #4A6BD1 50%);
}

.rectangle:hover::after {
  right: 0;
  background: linear-gradient(to top right, transparent 50%, #263D88 50%);
}

.rectangle-left {
  cursor: pointer;
  position: absolute;
  top: 0;
  left: 0;
  width: 200px;
}

.rectangle-left::before,
.rectangle-left::after {
  border-top-left-radius: 8px;
  content: "";
  position: absolute;
  top: 0;
  width: 30px;
  height: 30px;
}

.headerDropCallback {
  width: 100%;
  height: 100%;
}

.rectangle-left::after {
  left: 0;
  background: linear-gradient(to top left, transparent 50%, rgba(0, 174, 169, 0.18) 50%);
}

.rectangle-left:hover::after {
  left: 0;
  background: linear-gradient(to top left, transparent 50%, #263D88 50%);
}

.dropWindowLeft-highlight {
  position: fixed;
  top: 0;
  left: 0;
  max-width: 60px;
  width: 10%;
  height: 100%;
  pointer-events: none;
  z-index: 19999;
  background: radial-gradient(ellipse at left center, rgba(0, 174, 169, 0.28) 50%, transparent 70%);
}

.dropWindowRight-highlight {
  position: fixed;
  top: 0;
  right: 0;
  max-width: 60px;
  width: 10%;
  height: 100%;
  pointer-events: none;
  z-index: 19999;
  background: radial-gradient(ellipse at right center, rgba(0, 174, 169, 0.28) 50%, transparent 70%);
}

@keyframes highlight {
  0% {
    background-position: 0 0;
  }
  100% {
    background-position: 200% 0;
  }
}
.checkTest {
  position: sticky;
  top: 20px;
}

  z-index: 1010;
  width: 100%;
}
.header-wrap .activeHeaderTab {
  border-radius: 6px;
  background-color: #F4F5F7;
}

header {
  height: 60px;
  align-items: center;
  padding: 0 24px;
  border-bottom: 1px solid #DEDFE2;
}
header .header-info .header-bell {
  position: relative;
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  border-radius: 50%;
  margin-right: 64px;
  transition: background 0.2s ease;
}
header .header-info .header-bell:hover {
  background: #EBF9F9;
}
header .header-info .header-bell i {
  color: #30353C;
  transition: color 0.2s ease;
}
header .header-info .header-bell.header-bell--open i {
  color: #08D8D2;
}
header .header-info .header-bell-badge {
  position: absolute;
  z-index: 2;
  width: 15px;
  height: 15px;
  background: #F1545B;
  border-radius: 9999px;
  top: 2px;
  right: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #FFFFFF;
  font-weight: 600;
  font-size: 10px;
  line-height: 1;
}
header .header-info .header-tabs-wrap {
  display: inline-flex;
  align-items: center;
  height: 44px;
  padding: 4px;
  gap: 4px;
  background: #F4F5F7;
  border-radius: 12px;
}
header .header-info .header-tabs-wrap > * {
  margin-right: 0 !important;
}
header .header-info .header-static-item {
  padding: 8px 10px 8px 10px;
  color: #71717A;
  font-weight: 600;
  cursor: pointer;
}
header .header-info .header-tab {
  font-family: "Open Sans", sans-serif;
  font-weight: 600;
  font-size: 14px;
  line-height: 20px;
  color: #71717A;
  margin: 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 36px;
  padding: 8px 12px;
  border-radius: 10px;
  background: transparent;
}
header .header-info .header-tab--active {
  background: #FFFFFF;
  color: #1F2937;
  box-shadow: 0px 1px 2px -1px rgba(10, 13, 18, 0.1), 0px 1px 3px 0px rgba(10, 13, 18, 0.1);
}
header .header-info .header-tab-badge {
  border-radius: 9999px;
  padding: 2px 8px;
  background: #FAFAFA;
  border: 1px solid #E9EAEB;
  margin-left: 0;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  box-sizing: border-box;
}
header .header-info .header-tab:not(.header-tab--active) .header-tab-badge {
  color: #71717A;
}
header .header-info .header-tab--active .header-tab-badge {
  color: #1F2937;
}
header .header-info .static-count-header {
  margin-left: 5px;
  cursor: pointer;
  color: #1F2937;
  padding: 3px 9px;
  border: 1px solid #DEDFE2;
  border-radius: 3px;
  background: #F9FAFB;
}
header .header-info .header-tab .static-count-header:not(.header-tab-badge) {
  border-radius: 9999px;
  padding: 2px 8px;
  background: #FAFAFA;
  border: 1px solid #E9EAEB;
  margin-left: 0;
}
header .header-info .activeHeaderTabCount {
  background-color: var(--Wine, #A73064) !important;
  color: white !important;
  border-color: var(--Wine, #A73064) !important;
}
header .header-info .countAsterictisk {
  cursor: pointer;
  width: 32px;
  margin-left: 14px;
  margin-top: 0.3rem;
  height: 22px;
  border-left: 1px solid #A8A5A5;
  padding: 2px 8px 4px 10px;
}
header .header-info .countAsterictisk:after {
  border-left: 1px solid #A8A5A5;
}
header .header-actions {
  display: flex;
}

.layout-sidebar {
  background-color: #F9FAFB;
  height: calc(100vh - 45px);
  margin: 0 1px 0 0;
  border-right: 1px solid #DEDFE2;
  border-left: 1px solid #DEDFE2;
  padding: 42px 0 0 0;
  width: 240px;
}
.layout-sidebar .layout-sidebar-wrap {
  background-color: #F9FAFB;
  border-right: 1px solid #DEDFE2;
  border-left: 1px solid #DEDFE2;
  position: fixed;
  width: inherit;
  overflow-y: auto;
  overflow-x: hidden;
  max-height: 90vh;
}
.layout-sidebar .changePositionWrap {
  width: 100%;
  bottom: 20px;
}
.layout-sidebar .changePositionWrap .changePosition {
  cursor: pointer;
  display: flex;
  justify-content: center;
}
.layout-sidebar .changePositionWrap .changePosition i {
  color: #71717A;
  width: 28px;
  height: 28px;
  font-size: 28px;
}
.layout-sidebar li {
  list-style: none;
}
.layout-sidebar li button {
  cursor: pointer;
  width: 100%;
  padding: 10px 10px 10px 20px;
  border: none;
  background-color: inherit;
  font-size: 15px;
  font-weight: 400;
  color: #1F2937;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.layout-sidebar li button span {
  font-size: 14px;
  display: flex;
  align-items: center;
}
.layout-sidebar li button span i {
  width: 34px;
  color: #71717A;
  font-size: 22px;
  padding-right: 12px;
  padding-bottom: 2px;
}
.layout-sidebar li button .openLinks {
  font-size: 14px;
  color: #71717A;
}
.layout-sidebar li button:hover {
  background-color: #CCE0FF;
}
.layout-sidebar li .activeBarLink {
  background-color: #DCEAFF;
}
.layout-sidebar li .activeBarLink:after {
  content: "";
  height: 34px;
  width: 4px;
  position: absolute;
  left: 0;
  background-color: #263D88;
}
.layout-sidebar li .activeBarLink:hover {
  background-color: #CCE0FF;
}
.layout-sidebar li .activeSubLink {
  background-color: #EAF2FF;
}
.layout-sidebar li .activeSubLinkChild {
  background-color: rgba(0, 174, 169, 0.08);
}
.layout-sidebar li .activeSubLink:hover {
  background-color: rgba(0, 174, 169, 0.08);
}
.layout-sidebar li .activeSubLinkChild:hover {
  background-color: rgba(0, 174, 169, 0.08);
}
.layout-sidebar li ol {
  padding: 0;
}
.layout-sidebar li .sub-link {
  display: flex;
  padding: 10px 10px 10px 30px;
  font-size: 13px;
  font-weight: 400;
  color: #1F2937;
  cursor: pointer;
}
.layout-sidebar li .sub-link i {
  width: 34px;
  color: #71717A;
  font-size: 20px;
}
.layout-sidebar li .sub-link:hover {
  background-color: #F4F5F7;
}
.layout-sidebar .p-panelmenu .p-panelmenu-header .p-panelmenu-header-content {
  border: none;
}
.layout-sidebar .p-panelmenu .p-panelmenu-header .p-panelmenu-header-content .p-panelmenu-header-action {
  height: 40px;
  padding: 0 10px 0 20px;
  border: none;
  font-size: 14px;
  font-weight: 400;
  color: #1F2937;
}
.layout-sidebar .iconToggleWrap {
  position: absolute;
  cursor: pointer;
  background-color: white;
  width: 30px;
  height: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 15px;
  box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
}
.layout-sidebar .iconToggleWrap i {
  color: #263D88;
  font-size: 16px;
  width: 18px;
  height: 16px;
