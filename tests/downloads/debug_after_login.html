.loginContainer {
  position: relative;
  min-height: 100vh;
  background-color: #00142A;
  background-image: url("/assets_zz/images/background.png");
  background-size: 100% auto;
  background-position: bottom center;
  background-repeat: no-repeat;
}
.loginContainer .loginError {
  margin-top: -20px;
}
.loginContainer .login-card {
  background: #FFFFFF;
  border-radius: 10px;
  width: 100%;
  height: 100%;
  max-width: 750px;
  box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
}
.loginContainer .login-content-label {
  font-size: calc(0.725rem + 0.25vw);
}
.loginContainer .login-fieldset {
  margin: 0;
  padding: 0;
  border: 0;
}
.loginContainer .login-fieldset:disabled {
  opacity: 0.65;
}
.loginContainer .two-factor-section {
  margin-top: 24px;
}
.loginContainer .two-factor-label {
  display: block;
  margin-bottom: 8px;
  color: #1F2937;
}
.loginContainer .otpLoginError {
  display: block;
  margin: 0 0 8px;
}
.loginContainer .two-factor-qr {
  margin-bottom: 20px;
  text-align: center;
}
.loginContainer .two-factor-qr img {
  max-width: 220px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  background: white;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
}
.loginContainer .loginFooter {
  position: absolute;
  bottom: 2.5vh;
  width: 100%;
}
.loginContainer .loginFooter .login-content {
  display: flex;
  align-items: center;
  justify-content: center;
}
.loginContainer .loginFooter p {
  margin: 0 15px;
  cursor: pointer;
  color: white;
}
.loginContainer .loginFooter .dot {
  height: 6px;
  width: 6px;
  background-color: white;
  border-radius: 50%;
  display: inline-block;
}
.loginContainer .loginFooter .selectLang {
  margin-left: 10px;
  padding: 6px 20px 6px 0;
  border-radius: 6px;
}
.loginContainer .loginFooter .selectLang .p-dropdown {
  box-shadow: none;
  background: none;
  border: none;
}
.loginContainer .loginFooter .selectLang .p-dropdown .p-element {
  font-size: 16px;
}
.loginContainer .loginFooter .selectLang .p-dropdown .p-highlight {
  background: #F4F5F7;
  color: #263D88;
}
.loginContainer .loginFooter .selectLang .p-dropdown .p-dropdown-trigger {
  color: white;
  width: 10px;
}
.loginContainer .loginFooter .selectLang .p-dropdown .p-inputtext {
  color: white;
}
.loginContainer .p-password {
  width: 100%;
}
.loginContainer .p-inputtext {
  width: 100%;
}
.loginContainer .p-button:focus {
  box-shadow: none;
}
.loginContainer .loginButton {
  margin-top: 32px;
  background-color: #263D88;
  width: 100%;
  border: none;
}
.loginContainer .p-button:enabled:hover {
  border: none;
}
.loginContainer .p-button:enabled:active {
  border: none;
}

@media (min-width: 768px) {
  .login-card-wrap {
    width: 33%;
  }
}
@media (min-width: 1200px) {
  .login-card-wrap {
    width: 30%;
  }
}
@media (min-width: 1400px) {
  .login-content-label {
    font-size: 20px !important;
  }
  .selectLang .p-dropdown .p-element {
    font-size: 20px !important;
  }
}
