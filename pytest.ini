[pytest]
addopts = -q -p no:cacheprovider --tb=no --no-summary
testpaths = tests
markers =
    administration: administration module tests
    extensions: administration extensions section tests
    notifications: administration notifications section tests
    special_numbers: administration special numbers section tests
    integration: integration/e2e tests that depend on external services
    smoke: small set of critical read-only UI checks
    regression: broader functional regression coverage
    destructive: tests that create, edit, delete, or publish data (opt in with -m destructive)
    extended: lower-priority or overlapping UI checks excluded from the focused default regression
    publish: publish behavior tests
    cloud_related: behavior that only applies to cloud environments
    requires_microsip: tests that require local MicroSIP setup
    not_automated: linked TestLink case that still needs Selenium implementation
    testlink(id, title): linked TestLink test case metadata
